<!DOCTYPE html>
<html lang="fr">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Créer un compte • NetView</title>

    <!-- Font Awesome -->

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    >

    <!-- Design System -->

    <link rel="stylesheet" href="css/core/variables.css">
    <link rel="stylesheet" href="css/core/reset.css">
    <link rel="stylesheet" href="css/core/typography.css">
    <link rel="stylesheet" href="css/core/animations.css">
    <link rel="stylesheet" href="css/core/utilities.css">

    <link rel="stylesheet" href="css/components/buttons.css">
    <link rel="stylesheet" href="css/components/forms.css">
    <link rel="stylesheet" href="css/components/cards.css">
    <link rel="stylesheet" href="css/components/loader.css">
    <link rel="stylesheet" href="css/components/toast.css">

    <!-- Page -->

    <link rel="stylesheet" href="css/pages/signup.css">

</head>

<body>

    <!-- Background -->

    <div class="signup-background">

        <div class="signup-gradient"></div>

        <div class="signup-particles"></div>

        <div class="signup-orb orb-1"></div>
        <div class="signup-orb orb-2"></div>
        <div class="signup-orb orb-3"></div>

    </div>

    <!-- Page -->

    <main class="signup-page">

        <section class="signup-card">

            <img
                src="NetView_icone.png"
                alt="NetView"
                class="signup-logo"
            >

            <h1>

                Créer un compte

            </h1>

            <p>

                Rejoignez NetView gratuitement.

            </p>

            <form
                id="signupForm"
                class="nv-form"
                novalidate
            >

        <!-- ==========================================
     Username
========================================== -->

<div class="nv-form-group">

    <label
        class="nv-label"
        for="username"
    >

        Nom d'utilisateur

        <span class="nv-required">*</span>

    </label>

    <div class="nv-input-wrapper">

        <i class="fa-solid fa-at nv-input-icon"></i>

        <input
            type="text"
            id="username"
            class="nv-input"
            placeholder="ex : netviewer"
            autocomplete="username"
            maxlength="30"
            required
        >

    </div>

    <small
        id="usernameMessage"
        class="nv-help"
    >

        Lettres, chiffres, _ et .

    </small>

</div>

            </form>

        </section>

    </main>

    <script
        type="module"
        src="js/pages/signup.js"
    ></script>

</body>

</html>
