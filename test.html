<!DOCTYPE html>

<html lang="fr">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NetView System Test</title>


<!-- ==========================
     CORE CSS
========================== -->

<link rel="stylesheet" href="CSS/core/variables.css">

<link rel="stylesheet" href="CSS/core/reset.css">

<link rel="stylesheet" href="CSS/core/typography.css">

<link rel="stylesheet" href="CSS/core/animations.css">

<link rel="stylesheet" href="CSS/core/utilities.css">



<!-- ==========================
     COMPONENTS CSS
========================== -->

<link rel="stylesheet" href="CSS/components/buttons.css">

<link rel="stylesheet" href="CSS/components/forms.css">

<link rel="stylesheet" href="CSS/components/cards.css">

<link rel="stylesheet" href="CSS/components/header.css">

<link rel="stylesheet" href="CSS/components/sidebar.css">

<link rel="stylesheet" href="CSS/components/footer.css">

<link rel="stylesheet" href="CSS/components/modal.css">

<link rel="stylesheet" href="CSS/components/toast.css">

<link rel="stylesheet" href="CSS/components/loader.css">


</head>


<body>


<header class="nv-header">

<div class="nv-header-logo">

<span>
NetView
</span>

</div>


</header>



<aside class="nv-sidebar">


<div class="nv-sidebar-nav">


<div class="nv-sidebar-item active">

<div class="nv-sidebar-icon">
⌂
</div>

<div class="nv-sidebar-text">
Accueil
</div>

</div>


<div class="nv-sidebar-item">

<div class="nv-sidebar-icon">
▶
</div>

<div class="nv-sidebar-text">
Vidéos
</div>

</div>


</div>


</aside>




<main class="nv-content">


<section class="nv-card nv-card-body">


<h1>
NetView Core Test
</h1>


<p>
Test officiel Jour 2 + Jour 3
</p>


</section>





<section class="nv-card nv-card-body">


<h2>
CSS Components
</h2>



<button class="nv-btn nv-btn-primary">

Primary Button

</button>


<button class="nv-btn nv-btn-gradient">

Gradient Button

</button>


<button class="nv-btn nv-btn-pro">

Pro Button

</button>



</section>





<section class="nv-card nv-card-body">


<h2>
Forms
</h2>


<div class="nv-form-group">


<label class="nv-label">

Email

</label>


<input 
class="nv-input"
placeholder="email@netview.com">


</div>



</section>






<section class="nv-card nv-card-body">


<h2>
JavaScript Tests
</h2>



<button 
class="nv-btn nv-btn-primary"
id="session">

Session

</button>



<button 
class="nv-btn nv-btn-secondary"
id="role">

Role

</button>



<button 
class="nv-btn nv-btn-gradient"
id="toast">

Toast

</button>



<button 
class="nv-btn nv-btn-pro"
id="modal">

Modal

</button>



<button 
class="nv-btn nv-btn-live"
id="loader">

Loader

</button>



<button 
class="nv-btn nv-btn-outline"
id="navigation">

Navigation

</button>



</section>


</main>





<!-- ==========================
     MODAL TEST
========================== -->


<div 
class="nv-modal-overlay"
id="testModal">


<div class="nv-modal">


<div class="nv-modal-header">


<div class="nv-modal-title">

NetView Modal Test

</div>


<button 
class="nv-modal-close"
id="closeModal">

×


</button>


</div>



<div class="nv-modal-body">


Le système de modal fonctionne.


</div>



</div>


</div>






<!-- ==========================
     LOADER TEST
========================== -->


<div 
class="nv-page-loader"
id="loaderBox"
style="display:none;">


<div class="nv-spinner nv-spinner-lg"></div>


<div class="nv-loader-text">

Chargement NetView

</div>


</div>





<script type="module">


import {

getSession,

getRole,

getProfile

} from "./js/core/auth.js";


import {

navigate

} from "./js/core/navigation.js";


import {

showToast,

openModal,

closeModal,

showLoader,

hideLoader

} from "./js/core/ui.js";





// ==========================
// SESSION TEST
// ==========================


document
.getElementById("session")
.onclick = async ()=>{


try{


const session =
await getSession();



if(session){


showToast(
"Session active",
"success"
);


}

else{


showToast(
"Aucune session",
"warning"
);


}


}

catch(error){


showToast(
error.message,
"error"
);


}


};





// ==========================
// ROLE TEST
// ==========================


document
.getElementById("role")
.onclick = async ()=>{


try{


const role =
await getRole();



showToast(

"Role : " + (role ?? "aucun"),

"info"

);


}

catch(error){


showToast(
error.message,
"error"
);


}


};





// ==========================
// TOAST
// ==========================


document
.getElementById("toast")
.onclick = ()=>{


showToast(

"NetView Toast fonctionne",

"success"

);


};





// ==========================
// MODAL
// ==========================


document
.getElementById("modal")
.onclick = ()=>{


openModal(
"testModal"
);


};


document
.getElementById("closeModal")
.onclick = ()=>{


closeModal(
"testModal"
);


};





// ==========================
// LOADER
// ==========================


document
.getElementById("loader")
.onclick = ()=>{


const box =
document.getElementById(
"loaderBox"
);



box.style.display="flex";



setTimeout(()=>{


box.style.display="none";


showToast(

"Loader terminé",

"success"

);


},2000);


};





// ==========================
// NAVIGATION
// ==========================


document
.getElementById("navigation")
.onclick = ()=>{


navigate(
"index.html"
);


};



</script>


</body>

</html>
