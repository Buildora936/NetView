<!DOCTYPE html>

<html lang="fr">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NetView System Test</title>


<!-- CORE CSS -->

<link rel="stylesheet" href="css/core/variables.css">
<link rel="stylesheet" href="css/core/reset.css">
<link rel="stylesheet" href="css/core/typography.css">
<link rel="stylesheet" href="css/core/animations.css">
<link rel="stylesheet" href="css/core/utilities.css">


<!-- COMPONENTS CSS -->

<link rel="stylesheet" href="css/components/buttons.css">
<link rel="stylesheet" href="css/components/forms.css">
<link rel="stylesheet" href="css/components/cards.css">
<link rel="stylesheet" href="css/components/header.css">
<link rel="stylesheet" href="css/components/sidebar.css">
<link rel="stylesheet" href="css/components/footer.css">
<link rel="stylesheet" href="css/components/modal.css">
<link rel="stylesheet" href="css/components/toast.css">
<link rel="stylesheet" href="css/components/loader.css">


</head>


<body>


<!-- HEADER TEST -->

<header class="nv-header">


<div class="nv-header-logo">

<img src="" alt="NetView">

<span>
NetView
</span>

</div>



<div class="nv-header-search">

<input 
class="nv-input"
placeholder="Rechercher sur NetView">


</div>



<div class="nv-header-actions">

<button class="nv-icon-btn">
🔔
</button>


<button class="nv-btn nv-btn-primary">

Créer

</button>


</div>


</header>





<!-- SIDEBAR TEST -->


<aside class="nv-sidebar">


<nav class="nv-sidebar-nav">


<div class="nv-sidebar-item active">

<div class="nv-sidebar-icon">
🏠
</div>

<div class="nv-sidebar-text">
Accueil
</div>

</div>



<div class="nv-sidebar-item">

<div class="nv-sidebar-icon">
🎬
</div>

<div class="nv-sidebar-text">
Vidéos
</div>

</div>



<div class="nv-sidebar-item">

<div class="nv-sidebar-icon">
💬
</div>

<div class="nv-sidebar-text">
Messages
</div>

</div>


</nav>


</aside>





<main class="nv-content" style="padding:40px;">


<h1>
NetView Core Test
</h1>


<p>
Test complet CSS + JavaScript
</p>





<!-- BUTTON TEST -->


<section class="nv-card nv-card-body">


<h2>
Buttons
</h2>


<button class="nv-btn nv-btn-primary">

Primary

</button>


<button class="nv-btn nv-btn-gradient">

Gradient

</button>


<button class="nv-btn nv-btn-pro">

Pro

</button>


<button class="nv-btn nv-btn-live">

Live

</button>


</section>






<!-- FORM TEST -->


<section class="nv-card nv-card-body">


<h2>
Forms
</h2>


<div class="nv-form-group">


<label class="nv-label">

Email

</label>


<input 
class="nv-input"
placeholder="email">


</div>



<textarea
class="nv-textarea"
placeholder="Description">

</textarea>



</section>






<!-- CARD TEST -->


<section>


<h2>
Cards
</h2>



<div class="nv-card nv-video-card">


<div class="nv-card-media">


<img 
src="https://picsum.photos/600/300">


</div>



<div class="nv-card-body">


<div class="nv-video-title">

Vidéo test NetView

</div>


<div class="nv-video-info">

1000 vues

</div>


</div>


</div>



</section>







<!-- UI TEST -->


<section class="nv-card nv-card-body">


<h2>
JavaScript UI
</h2>



<button 
id="toast"
class="nv-btn nv-btn-primary">

Toast

</button>



<button 
id="modal"
class="nv-btn nv-btn-secondary">

Modal

</button>



<button 
id="loader"
class="nv-btn nv-btn-pro">

Loader

</button>


</section>








<!-- AUTH TEST -->


<section class="nv-card nv-card-body">


<h2>
Authentication
</h2>


<button
id="session"
class="nv-btn nv-btn-outline">

Tester Session

</button>


<button
id="role"
class="nv-btn nv-btn-outline">

Tester Role

</button>


</section>







</main>







<!-- MODAL -->


<div 
id="testModal"
class="nv-modal-overlay">


<div class="nv-modal">


<div class="nv-modal-header">


<div class="nv-modal-title">

NetView Modal

</div>


<button 
class="nv-modal-close"
id="closeModal">

×

</button>


</div>



<div class="nv-modal-body">

Modal système fonctionnel.

</div>



</div>


</div>







<!-- LOADER -->


<div 
class="nv-page-loader"
id="pageLoader"
style="display:none;">


<div class="nv-spinner nv-spinner-lg"></div>


<div class="nv-loader-text">

Chargement NetView

</div>


</div>









<script type="module">


import {


getSession,

getRole


} from "./js/core/auth.js";



import {


showToast,

openModal,

closeModal,

showLoader,

hideLoader


} from "./js/core/ui.js";






// Toast


document
.getElementById("toast")
.onclick = ()=>{


showToast(

"NetView Toast fonctionne",

"success"

);


};






// Modal


document
.getElementById("modal")
.onclick = ()=>{


openModal(
"testModal"
);


};



document
.getElementById("closeModal")
.onclick = ()=>{


closeModal(
"testModal"
);


};







// Loader


document
.getElementById("loader")
.onclick = ()=>{


showLoader();


setTimeout(()=>{


hideLoader();


showToast(

"Chargement terminé",

"info"

);


},2000);


};








// Session


document
.getElementById("session")
.onclick = async ()=>{


try{


const session = await getSession();



if(session){


showToast(

"Utilisateur connecté",

"success"

);


}

else{


showToast(

"Aucune session active",

"warning"

);


}


}

catch(error){


showToast(

error.message,

"error"

);


}


};







// Role


document
.getElementById("role")
.onclick = async ()=>{


try{


const role = await getRole();



showToast(

"Role : " + (role ?? "aucun"),

"info"

);


}

catch(error){


showToast(

error.message,

"error"

);


}


};




</script>



</body>

</html>
