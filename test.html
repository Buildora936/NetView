<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Test Signup - NetView</title>

<style>

body{

    margin:0;

    font-family:Arial,sans-serif;

    background:#0f172a;

    color:#fff;

    display:flex;

    justify-content:center;

    align-items:center;

    min-height:100vh;

}

form{

    width:350px;

    padding:30px;

    background:#1e293b;

    border-radius:12px;

}

input{

    width:100%;

    box-sizing:border-box;

    padding:12px;

    margin-bottom:15px;

    border:none;

    border-radius:8px;

}

button{

    width:100%;

    padding:12px;

    border:none;

    border-radius:8px;

    background:#2563EB;

    color:white;

    font-size:16px;

    cursor:pointer;

}

#error{

    margin-top:15px;

    color:#ff6b6b;

}

#success{

    margin-top:15px;

    color:#4ade80;

}

</style>

</head>

<body>

<form id="signupForm">

<h2>Signup Test</h2>

<input
id="email"
type="email"
placeholder="Email"
required>

<input
id="password"
type="password"
placeholder="Mot de passe"
required>

<button type="submit">

Créer le compte

</button>

<div id="error"></div>

<div id="success"></div>

</form>

<script type="module">

import { signUp } from "./js/core/auth.js";

const form =
document.getElementById("signupForm");

const email =
document.getElementById("email");

const password =
document.getElementById("password");

const error =
document.getElementById("error");

const success =
document.getElementById("success");

form.addEventListener(

"submit",

async(e)=>{

    e.preventDefault();

    error.textContent="";

    success.textContent="";

    try{

        const {

            data,

            error:signupError

        } = await signUp(

            email.value.trim(),

            password.value

        );

        if(signupError){

            throw signupError;

        }

        success.textContent =
        "Compte créé avec succès.";

        console.log(data);

    }

    catch(err){

        console.error(err);

        error.textContent =
        err.message;

    }

});

</script>

</body>
</html>
