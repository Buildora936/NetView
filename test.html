<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Test Signup - NetView</title>

<style>

body{

    margin:0;

    font-family:Arial,sans-serif;

    background:#0f172a;

    color:#fff;

    display:flex;

    justify-content:center;

    align-items:center;

    min-height:100vh;

}

form{

    width:350px;

    padding:30px;

    background:#1e293b;

    border-radius:12px;

}

input{

    width:100%;

    box-sizing:border-box;

    padding:12px;

    margin-bottom:15px;

    border:none;

    border-radius:8px;

}

button{

    width:100%;

    padding:12px;

    border:none;

    border-radius:8px;

    background:#2563EB;

    color:white;

    font-size:16px;

    cursor:pointer;

}

#error{

    margin-top:15px;

    color:#ff6b6b;

}

#success{

    margin-top:15px;

    color:#4ade80;

}

</style>

</head>

<body>

<!-- ==========================================
Animated Background
========================================== -->

<div class="nv-signup-background">

    <div class="nv-orb nv-orb-1"></div>

    <div class="nv-orb nv-orb-2"></div>

    <div class="nv-orb nv-orb-3"></div>

    <div class="nv-particles">

        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>

    </div>

</div>

<!-- ==========================================
Signup
========================================== -->

<main class="nv-signup">

    <div class="nv-signup-container">

        <!-- ==========================================
        Card
        ========================================== -->

        <section class="nv-signup-card">

            <!-- Logo -->

            <img

                src="NetView.png"

                alt="NetView"

                class="nv-signup-logo"

            >

            <!-- Title -->

            <h1 class="nv-signup-title">

                Créer votre compte

            </h1>

            <!-- Subtitle -->

            <p class="nv-signup-subtitle">

                Rejoignez NetView pour publier des vidéos,
                créer des chaînes, diffuser des lives,
                discuter avec votre communauté et développer
                votre activité.

            </p>

            <!-- Form -->

            <form

                id="signupForm"

                class="nv-signup-form"

            >

                <!-- Les champs seront ajoutés à l'étape 2 -->

            </form>

        </section>

    </div>

</main>

<script type="module">

import { signUp } from "./js/core/auth.js";

const form =
document.getElementById("signupForm");

const email =
document.getElementById("email");

const password =
document.getElementById("password");

const error =
document.getElementById("error");

const success =
document.getElementById("success");

form.addEventListener(

"submit",

async(e)=>{

    e.preventDefault();

    error.textContent="";

    success.textContent="";

    try{

        const {

            data,

            error:signupError

        } = await signUp(

            email.value.trim(),

            password.value

        );

        if(signupError){

            throw signupError;

        }

        success.textContent =
        "Compte créé avec succès.";

        console.log(data);

    }

    catch(err){

        console.error(err);

        error.textContent =
        err.message;

    }

});

</script>

</body>
</html>
